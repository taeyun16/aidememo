[tools]
rust = "1.96.0"
node = "24"
python = ["3.13", "3.12", "3.10"]
uv = "0.11.21"
go = "1.24"
erlang = "28"
elixir = "1.20.1-otp-28"

[env]
CARGO_INCREMENTAL = "0"
CARGO_NET_GIT_FETCH_WITH_CLI = "true"
CARGO_NET_RETRY = "10"
AIDEMEMO_MATURIN_SPEC = "maturin==1.14.0"
AIDEMEMO_UV_SPEC = "uv==0.11.21"
PYO3_USE_ABI3_FORWARD_COMPATIBILITY = "1"
RUSTUP_MAX_RETRIES = "10"

[tasks.ci-lint]
description = "Run the local equivalent of the CI lint job"
run = "./scripts/ci-local.sh lint"

[tasks.ci-test]
description = "Run the local equivalent of the CI Rust test job"
run = "./scripts/ci-local.sh test"

[tasks.bindings-smoke]
description = "Run cross-binding smoke checks"
run = "./scripts/bindings-release-smoke.sh"

[tasks.release-preflight]
description = "Run the local release preflight gate"
run = "./scripts/release-preflight.sh"

[tasks.changelog-release-check]
description = "Verify CHANGELOG.md is cut for the current release version"
run = "python3 scripts/changelog-release-check.py"

[tasks.cargo-package-readiness]
description = "Run the Rust cargo publish dry-run readiness gate"
run = "./scripts/cargo-package-readiness.sh"

[tasks.public-registry-smoke]
description = "Plan post-release public registry install checks"
run = "./scripts/public-registry-smoke.sh"

[tasks.public-portability-check]
description = "Reject developer-specific home paths from public tracked files"
run = "python3 scripts/public-portability-check.py"

[tasks.fresh-checkout-smoke]
description = "Build and exercise onboarding from an artifact-free checkout copy"
run = "./scripts/fresh-checkout-smoke.sh"

[tasks.python-pack-smoke]
description = "Build and install-smoke the aidememo-python wheel via uvx+maturin"
run = "./scripts/aidememo-python-pack-smoke.sh"

[tasks.python-publish-dry-run]
description = "Build and validate aidememo-python PyPI payloads via uvx+maturin"
run = "./scripts/aidememo-python-publish-dry-run.sh"

[tasks.agent-sdk-publish-dry-run]
description = "Build and validate aidememo-agent-sdk PyPI payloads"
run = "./scripts/aidememo-agent-sdk-publish-dry-run.sh"

[tasks.hermes-publish-dry-run]
description = "Build and validate hermes-aidememo PyPI payloads"
run = "./scripts/hermes-aidememo-publish-dry-run.sh"

[tasks.docs-install]
description = "Install the Docusaurus documentation site dependencies"
run = "npm --prefix website install"

[tasks.docs-build]
description = "Build the static Docusaurus documentation site"
run = "npm --prefix website run build"

[tasks.docs-start]
description = "Run the Docusaurus documentation site locally"
run = "npm --prefix website run start -- --host 127.0.0.1"
