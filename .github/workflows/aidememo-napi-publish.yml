name: aidememo-napi publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact aidememo-napi package.json version to publish"
        required: true
        type: string
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        default: true
        type: boolean

concurrency:
  group: aidememo-napi-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AIDEMEMO_NAPI_EXPECT_VERSION: ${{ inputs.version }}

permissions:
  contents: read
  id-token: write

jobs:
  platform:
    name: platform ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    environment: npm-publish
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: publish current platform package
        shell: bash
        env:
          AIDEMEMO_NAPI_PUBLISH_MODE: ${{ inputs.dry_run && 'dry-run' || 'publish' }}
          AIDEMEMO_NAPI_PUBLISH_SCOPE: platform
        run: scripts/aidememo-napi-publish.sh

  root:
    name: root wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-publish
    needs: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: publish root wrapper package
        shell: bash
        env:
          AIDEMEMO_NAPI_PUBLISH_MODE: ${{ inputs.dry_run && 'dry-run' || 'publish' }}
          AIDEMEMO_NAPI_PUBLISH_SCOPE: root
        run: scripts/aidememo-napi-publish.sh
