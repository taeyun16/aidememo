name: Rust crates publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact workspace version and v-prefixed tag to publish"
        required: true
        type: string
      publish:
        description: "Publish to crates.io; false only verifies OIDC and package readiness"
        required: true
        default: false
        type: boolean

concurrency:
  group: crates-publish
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_VERSION: ${{ inputs.version }}

permissions:
  contents: read

jobs:
  publish:
    name: publish Rust crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: crates-publish-v1
          save-if: false

      - name: validate release tag and version pins
        run: |
          test "$(git describe --tags --exact-match)" = "v$RELEASE_VERSION"
          scripts/aidememo-release-version.sh
          python3 scripts/changelog-release-check.py "$RELEASE_VERSION"

      - name: validate core publish payload
        env:
          AIDEMEMO_CARGO_PACKAGE_CHECK_DEPENDENTS: "0"
        run: scripts/cargo-package-readiness.sh

      - name: authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: publish crates in dependency order
        if: ${{ inputs.publish }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          publish_crate() {
            local crate="$1"
            local endpoint="https://crates.io/api/v1/crates/${crate}/${RELEASE_VERSION}"
            local http_status

            http_status="$(curl --silent --show-error --output /dev/null \
              --write-out '%{http_code}' \
              --user-agent 'aidememo-release-workflow/0.1 (https://github.com/taeyun16/aidememo)' \
              "$endpoint")"
            case "$http_status" in
              200)
                echo "${crate} ${RELEASE_VERSION} is already published; skipping"
                ;;
              404)
                cargo publish -p "$crate"
                ;;
              *)
                echo "unexpected crates.io response for ${crate}: HTTP ${http_status}" >&2
                return 1
                ;;
            esac
          }

          publish_crate aidememo-core
          publish_crate aidememo-cli
          publish_crate aidememo-ffi
          publish_crate aidememo-napi
          publish_crate aidememo-nif
          publish_crate aidememo-python
