name: CLI release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v-prefixed GitHub release tag to build or backfill"
        required: true
        type: string

concurrency:
  group: cli-release-assets-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
  RUSTUP_MAX_RETRIES: 10

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: check out release packaging tool
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .release-tools
          sparse-checkout: scripts/package-cli-release.sh

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-12
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 2026-03-12
        with:
          shared-key: cli-release-${{ matrix.target }}-v1
          save-if: false

      - name: validate release tag and version
        shell: bash
        run: |
          set -euo pipefail
          test "$RELEASE_TAG" = "v${RELEASE_TAG#v}"
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"
          test "$(cargo metadata --no-deps --format-version 1 | jq -r '.workspace_metadata.version // .packages[0].version')" = "${RELEASE_TAG#v}"
          scripts/aidememo-release-version.sh

      - name: build release binary
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: cargo build --locked --release -p aidememo-cli --target "${{ matrix.target }}"

      - name: package release archive
        shell: bash
        run: |
          .release-tools/scripts/package-cli-release.sh \
            "$RELEASE_TAG" \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/aidememo" \
            dist

      - name: upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aidememo-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: attach archives to GitHub release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: aidememo-*
          path: dist
          merge-multiple: true

      - name: create checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: attach assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/SHA256SUMS \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
