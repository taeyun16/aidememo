name: e2e — natural-language prompt (scenario C)

# Triggered manually or by adding the `run-e2e-c` label to a same-repository PR.
# Intentionally NOT triggered on every push: this workflow burns
# model tokens (claude + codex + hermes, ~50–100k tokens per run)
# and depends on a self-hosted runner that has those CLIs installed
# and authenticated. Fork pull requests must never reach that host.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

env:
  # See note in ci.yml — opt actions/checkout@v4 etc. onto Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write   # so we can comment back on the labelled PR

jobs:
  scenario-c:
    name: scenario C — claude / codex / hermes
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'run-e2e-c' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, macos]   # see bench/multi-agent/README.md
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: build aidememo
        run: cargo build -p aidememo-cli --release

      - name: scenario C
        env:
          AIDEMEMO_BIN: ${{ github.workspace }}/target/release/aidememo
          AIDEMEMO_E2E_STORE: ${{ runner.temp }}/aidememo-e2e-c/wiki.sqlite
          # Repository variables can override command names when the self-hosted
          # runner does not expose these CLIs on PATH.
          CLAUDE_BIN: ${{ vars.CLAUDE_BIN || 'claude' }}
          CODEX_BIN: ${{ vars.CODEX_BIN || 'codex' }}
          HERMES_BIN: ${{ vars.HERMES_BIN || 'hermes' }}
        run: python3 bench/multi-agent/scenario_c_natural_prompt.py

      - name: upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scenario-c-results
          path: bench/multi-agent/results/scenario_c.json
          retention-days: 30

      - name: comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'bench/multi-agent/results/scenario_c.json';
            if (!fs.existsSync(path)) return;
            const out = JSON.parse(fs.readFileSync(path, 'utf8'));
            const ok = out.summary.passed === out.summary.total;
            const lines = [
              `### scenario C — ${ok ? '✅' : '❌'} ${out.summary.passed}/${out.summary.total}`,
              '',
              '| agent | wall | facts quoted | ids matched |',
              '|---|---|---|---|',
              ...out.agents.map(a =>
                `| ${a.agent} | ${(a.wall_ms/1000).toFixed(1)}s | ${a.facts_quoted_count}/3 | ${a.ids_mentioned_count}/3 |`),
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
