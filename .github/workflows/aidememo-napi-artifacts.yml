name: aidememo-napi artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "aidememo-napi-v*"

concurrency:
  group: aidememo-napi-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aidememo-napi-${{ matrix.os }}-v1

      - name: pack smoke
        shell: bash
        run: scripts/aidememo-napi-pack-smoke.sh

      - name: upload package
        uses: actions/upload-artifact@v7
        with:
          name: aidememo-napi-${{ matrix.os }}
          path: |
            crates/aidememo-napi/aidememo-napi-*.tgz
            crates/aidememo-napi/npm/*/*.tgz
            crates/aidememo-napi/*.node
            crates/aidememo-napi/npm/**/*.node
            crates/aidememo-napi/index.js
            crates/aidememo-napi/index.d.ts
          if-no-files-found: error
          retention-days: 14
