name: aidememo-python publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact aidememo-python version to publish"
        required: true
        type: string
      dry_run:
        description: "Build and validate distributions without publishing"
        required: true
        default: true
        type: boolean

concurrency:
  group: aidememo-python-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  AIDEMEMO_PYTHON_EXPECT_VERSION: ${{ inputs.version }}

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aidememo-python-publish-v1

      - name: install maturin
        run: python -m pip install "maturin>=1.7,<2.0"

      - name: build and validate distributions
        run: AIDEMEMO_PYTHON_DIST_DIR=dist scripts/aidememo-python-publish-dry-run.sh

      - uses: actions/upload-artifact@v4
        with:
          name: aidememo-python-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish to PyPI
    if: ${{ ! inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment: pypi-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aidememo-python-dist
          path: dist

      - name: publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
