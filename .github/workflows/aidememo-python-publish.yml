name: aidememo-python publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact aidememo-python version to publish"
        required: true
        type: string
      dry_run:
        description: "Build and validate distributions without publishing"
        required: true
        default: true
        type: boolean

concurrency:
  group: aidememo-python-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  AIDEMEMO_PYTHON_EXPECT_VERSION: ${{ inputs.version }}

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-12
        with:
          toolchain: 1.96.0

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 2026-03-12
        with:
          shared-key: aidememo-python-publish-v1

      - name: install uv
        run: python -m pip install "uv==0.11.21"

      - name: build and validate distributions
        run: AIDEMEMO_PYTHON_DIST_DIR=dist scripts/aidememo-python-publish-dry-run.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aidememo-python-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish to PyPI
    if: ${{ ! inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment: pypi-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aidememo-python-dist
          path: dist

      - name: publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
