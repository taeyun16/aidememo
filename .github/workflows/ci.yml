name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — saves ~half the runner
# time when pushes land in quick succession.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  # Faster git deps (model2vec-native is fetched as a git source).
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  # Opt the JS-based actions onto Node 24 ahead of the 2026-09-16
  # forced cutover. checkout@v4 / setup-python@v5 still ship as
  # Node 20 bundles; this env flips them to the runner's Node 24.
  # Drop once we're on actions/checkout@v5+ everywhere.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # NB: do NOT set `RUSTFLAGS: -D warnings` here. RUSTFLAGS is applied
  # to *every* crate including transitive deps, so a single new lint
  # warning in any upstream crate (common after a stable bump) becomes
  # a fatal error and that crate's .rmeta is never produced — every
  # downstream workspace crate then fails with E0432 unresolved
  # imports. Pass -D warnings only to the workspace via clippy/rustdoc
  # invocations below.

permissions:
  contents: read

jobs:
  workflow-lint:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.1
      - name: actionlint
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "$actionlint_bin"
      - name: public portability
        run: python3 scripts/public-portability-check.py

  docs-site:
    name: Docusaurus docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm --prefix website ci
      - run: npm --prefix website audit --omit=dev
      - run: python3 scripts/docs-feature-gate.py
      - run: python3 scripts/docs-site-e2e.py

  # Static checks share one cache and one toolchain install. fmt is a
  # cheap fail-fast at the top; clippy + doc dominate the wall time.
  lint:
    name: fmt + clippy + doc
    runs-on: ubuntu-latest
    # rustdoc with `--no-deps` only runs over workspace crates, so
    # `-D warnings` here only affects our docs.
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
      - run: cargo fmt --all -- --check
      # `-- -D warnings` denies workspace clippy lints only; transitive
      # deps' new lints don't break us when stable advances.
      - run: cargo clippy --workspace --all-targets --features semantic -- -D warnings
      - run: cargo doc --workspace --no-deps --features semantic

  test:
    name: test (${{ matrix.os }})
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    # Pin Python for reproducible PyO3 builds across ubuntu/macos runners.
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          # ubuntu test reuses lint's cache; macOS gets its own.
          shared-key: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu-aidememo-v2' || 'macos-aidememo-v2' }}
          # Only the lint job writes the ubuntu cache; readers don't
          # save to avoid concurrent-write conflicts.
          save-if: ${{ matrix.os != 'ubuntu-latest' }}
      # Tests that download a HuggingFace embedding model are marked
      # `#[ignore]` (see crates/aidememo-core/src/{lib,search}.rs). cargo
      # skips them by default; run locally with `--ignored` to cover
      # the full surface.
      - run: cargo test --workspace --no-default-features
      - run: cargo check -p aidememo-core --no-default-features --features s3
      - run: scripts/storage-backend-feature-gate.sh
      - run: cargo test -p aidememo-core --features semantic
      - run: cargo test -p aidememo-cli --bin aidememo
      - run: scripts/storage-backend-sqlite-full-surface.sh
      - run: scripts/storage-backend-sqlite-advanced-surface.sh
      # model2vec-native lives in its own repo
      # (https://github.com/taeyun16/model2vec-native) and is pulled in
      # as a git dep when --features aidememo-core/semantic is on, so
      # `cargo test -p aidememo-core --features semantic` already exercises
      # it end-to-end here.

  cargo-package-readiness:
    name: Rust publish dry-run readiness
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - name: cargo publish dry-run readiness
        env:
          AIDEMEMO_CARGO_PACKAGE_CHECK_DEPENDENTS: "0"
        run: scripts/cargo-package-readiness.sh

  # Backend replacement compatibility guard. The matrix test job covers the
  # SQLite-only CLI surface; this job keeps the heavier cross-backend and SDK
  # gates visible in PR checks without duplicating them on macOS.
  storage-backend-compat:
    name: storage backend compatibility
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: storage backend parity
        run: scripts/storage-backend-parity.sh
      - name: storage backend real corpus diff
        run: scripts/storage-backend-real-corpus-diff.sh
      - name: SQLite MCP soak
        run: scripts/storage-backend-sqlite-mcp-soak.sh
      - name: SDK binding backend check
        run: scripts/storage-backend-sdk-bindings-check.sh

  # Upstream-CVE check. Pulls the RustSec advisory DB, parses our
  # committed Cargo.lock, and fails the build on any known-vulnerable
  # transitive dep that isn't on the documented ignore list (see
  # ./audit.toml for the rationale of each ignore). Independent of
  # `lint`, so a fresh security advisory doesn't have to wait for a
  # fmt/clippy/doc rerun.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Mirror audit.toml's ignore list. Keep both in sync — the file
      # carries the prose rationale, this list is what cargo-audit's
      # CLI actually honours when run from CI (it doesn't auto-load
      # an audit.toml in repo root).
      - run: |
          cargo audit \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2024-0436

  # Multi-process write contention regression. Verifies the documented
  # redb single-process lock contract — fail-fast, no data loss, no
  # deadlock, no ID collisions. Catches regressions to Store::open's
  # retry behaviour and to the lock-error detection.
  scenario-d:
    name: scenario D — concurrent writers
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: cargo build -p aidememo-cli --release --features redb
      - name: scenario D
        env:
          AIDEMEMO_BIN: ${{ github.workspace }}/target/release/aidememo
          AIDEMEMO_E2E_STORE: /tmp/aidememo-e2e/wiki.redb-concurrent
          # Trim the workload a bit for CI runners — still enough to
          # exercise lock contention without burning minutes.
          AIDEMEMO_E2E_PROCESSES: "3"
          AIDEMEMO_E2E_N_PER_PROC: "10"
        run: python3 bench/multi-agent/scenario_d_concurrent_writers.py

  # Zero-token release smoke for the workflow-memory path. Bundles
  # Scenario F (workflow context quality), Scenario I (doctor readiness
  # over real workflow traces), and a small fixture `aidememo doctor --json`
  # assertion. This is intentionally separate from the matrix test job
  # so workflow UX regressions are easy to spot in the checks list.
  workflow-release-smoke:
    name: workflow release smoke
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: workflow release smoke
        env:
          AIDEMEMO_RELEASE_SMOKE_BASE: ${{ runner.temp }}/aidememo-workflow-release-smoke
        run: scripts/workflow-release-smoke.sh

  # Fast SDK wording/parity guard. This catches drift between package docs,
  # session/pinned binding surfaces, error-mapping guarantees, version pins,
  # and the current "SDK candidate until public registry release" positioning
  # without running the heavier package smokes.
  sdk-promotion-check:
    name: SDK promotion check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: SDK promotion check
        run: scripts/sdk-promotion-check.sh

  # release-debug profile + dhat-heap feature are how `aidememo bench` reports
  # allocation backtraces. Compile-only check to make sure that path
  # doesn't bitrot — no need to run a benchmark in CI.
  dhat-build:
    name: dhat-heap build sanity
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - run: cargo build --profile release-debug -p aidememo-cli --features aidememo-core/semantic,dhat-heap

  ffi-c-smoke:
    name: aidememo-ffi C smoke
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - run: cargo build -p aidememo-ffi --release
      # libaidememo_ffi.a transitively links native_tls/openssl-sys via
      # aidememo-core's HTTP deps, so the cc invocation needs -lssl -lcrypto
      # to satisfy the OpenSSL symbols. Ubuntu runners already ship
      # libssl-dev, so no apt step needed.
      - run: |
          cc crates/aidememo-ffi/example/smoke.c \
             -I crates/aidememo-ffi/include \
             target/release/libaidememo_ffi.a \
             -lpthread -ldl -lm -lssl -lcrypto \
             -o target/aidememo-ffi-smoke
          target/aidememo-ffi-smoke

  # The plugin is pure Python (the AideMemoClient shells to the aidememo CLI by
  # default, with an optional in-process aidememo-python binding). We build
  # the aidememo CLI once and run pytest against both supported Python
  # versions sequentially in the same job — that's cheaper than two
  # parallel jobs that each redo the cargo build.
  hermes-plugin:
    name: hermes-aidememo plugin
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-aidememo-v2
          save-if: false
      - name: build aidememo CLI
        run: cargo build -p aidememo-cli

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            plugins/hermes/pyproject.toml
            packages/aidememo-agent-sdk/pyproject.toml
      - name: pytest (py3.10)
        working-directory: plugins/hermes
        run: |
          python -m pip install --upgrade pip
          pip install -e "../../packages/aidememo-agent-sdk"
          pip install -e ".[test]"
          pytest -q

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            plugins/hermes/pyproject.toml
            packages/aidememo-agent-sdk/pyproject.toml
      - name: pytest (py3.12)
        working-directory: plugins/hermes
        run: |
          python -m pip install --upgrade pip
          pip install -e "../../packages/aidememo-agent-sdk"
          pip install -e ".[test]"
          pytest -q

      - name: e2e smoke against real aidememo binary
        working-directory: plugins/hermes
        env:
          PATH: ${{ github.workspace }}/target/debug:${{ env.PATH }}
        run: |
          python - <<'PY'
          import os, shutil, tempfile
          from hermes_aidememo.client import AideMemoClient
          tmp = tempfile.mkdtemp(prefix="aidememo-ci-")
          try:
              c = AideMemoClient(store_path=os.path.join(tmp, "wiki.sqlite"))
              assert c.backend == "cli", f"expected cli backend, got {c.backend}"
              fid = c.fact_add("CI smoke fact", entities=["ci"], fact_type="note")
              assert len(fid) == 26, f"expected 26-char ULID, got {fid!r}"
              recent = c.recent(last="1h", limit=5)
              assert len(recent) == 1, f"expected 1 recent fact, got {len(recent)}"
              print("OK: hermes-aidememo e2e smoke passed")
          finally:
              shutil.rmtree(tmp, ignore_errors=True)
          PY
