name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --features semantic

  test:
    name: cargo test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-default-features
      - run: cargo test -p wg-core --features semantic
      - run: cargo test -p wg-cli --bin wg
      # model2vec-native lives in its own repo
      # (https://github.com/taeyun16/model2vec-native) and is pulled
      # in as a git dep when --features wg-core/semantic is on, so
      # `cargo test -p wg-core --features semantic` already exercises
      # it end-to-end here.

  dhat-build:
    name: dhat-heap build sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The release-debug profile + dhat-heap feature are how
      # `wg bench` reports allocation backtraces. Compile-only check
      # to make sure that path doesn't bitrot — no need to run a
      # benchmark in CI.
      - run: cargo build --profile release-debug -p wg-cli --features wg-core/semantic,dhat-heap

  docs:
    name: cargo doc (no warnings)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --features semantic

  ffi-c-smoke:
    name: wg-ffi C smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p wg-ffi --release
      - run: |
          cc crates/wg-ffi/example/smoke.c \
             -I crates/wg-ffi/include \
             target/release/libwg_ffi.a \
             -lpthread -ldl -lm \
             -o target/wg-ffi-smoke
          target/wg-ffi-smoke

  hermes-plugin:
    # The plugin is pure Python (the WgClient shells to the wg CLI by
    # default, with an optional in-process wg-python binding) so we
    # test it across the Python versions Hermes Agent itself supports
    # — 3.10 is the minimum, 3.12 the current stable. Building wg-cli
    # first lets the e2e smoke step exercise the JSON-fastpath /
    # legacy-fallback behaviour against a real binary instead of just
    # mocked subprocesses.
    name: hermes-wg plugin (py${{ matrix.python }})
    strategy:
      matrix:
        python: ["3.10", "3.12"]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: build wg CLI
        run: cargo build -p wg-cli
      - name: install plugin
        working-directory: plugins/hermes
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: pytest
        working-directory: plugins/hermes
        run: pytest -q
      - name: e2e smoke against real wg binary
        working-directory: plugins/hermes
        env:
          PATH: ${{ github.workspace }}/target/debug:${{ env.PATH }}
        run: |
          python - <<'PY'
          import os, shutil, tempfile
          from hermes_wg.client import WgClient
          tmp = tempfile.mkdtemp(prefix="wg-ci-")
          try:
              c = WgClient(store_path=os.path.join(tmp, "wiki.redb"))
              assert c.backend == "cli", f"expected cli backend, got {c.backend}"
              fid = c.fact_add("CI smoke fact", entities=["ci"], fact_type="note")
              assert len(fid) == 26, f"expected 26-char ULID, got {fid!r}"
              recent = c.recent(last="1h", limit=5)
              assert len(recent) == 1, f"expected 1 recent fact, got {len(recent)}"
              print("OK: hermes-wg e2e smoke passed")
          finally:
              shutil.rmtree(tmp, ignore_errors=True)
          PY
