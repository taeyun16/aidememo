name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — saves ~half the runner
# time when pushes land in quick succession.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  # Faster git deps (model2vec-native is fetched as a git source).
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTUP_MAX_RETRIES: 10
  # NB: do NOT set `RUSTFLAGS: -D warnings` here. RUSTFLAGS is applied
  # to *every* crate including transitive deps, so a single new lint
  # warning in any upstream crate (common after a stable bump) becomes
  # a fatal error and that crate's .rmeta is never produced — every
  # downstream workspace crate then fails with E0432 unresolved
  # imports. Pass -D warnings only to the workspace via clippy/rustdoc
  # invocations below.

permissions:
  contents: read

jobs:
  # Static checks share one cache and one toolchain install. fmt is a
  # cheap fail-fast at the top; clippy + doc dominate the wall time.
  lint:
    name: fmt + clippy + doc
    runs-on: ubuntu-latest
    # rustdoc with `--no-deps` only runs over workspace crates, so
    # `-D warnings` here only affects our docs.
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wg-v2
      - run: cargo fmt --all -- --check
      # `-- -D warnings` denies workspace clippy lints only; transitive
      # deps' new lints don't break us when stable advances.
      - run: cargo clippy --workspace --all-targets --features semantic -- -D warnings
      - run: cargo doc --workspace --no-deps --features semantic

  test:
    name: test (${{ matrix.os }})
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    # Pin Python to a version PyO3 0.23 supports (max 3.13). The
    # macos-latest runner ships 3.14 by default, which makes pyo3-ffi's
    # build script abort with "configured Python interpreter version
    # is newer than PyO3's maximum supported version".
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # ubuntu test reuses lint's cache; macOS gets its own.
          shared-key: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu-wg-v2' || 'macos-wg-v2' }}
          # Only the lint job writes the ubuntu cache; readers don't
          # save to avoid concurrent-write conflicts.
          save-if: ${{ matrix.os != 'ubuntu-latest' }}
      # Tests that download a HuggingFace embedding model are marked
      # `#[ignore]` (see crates/wg-core/src/{lib,search}.rs). cargo
      # skips them by default; run locally with `--ignored` to cover
      # the full surface.
      - run: cargo test --workspace --no-default-features
      - run: cargo test -p wg-core --features semantic
      - run: cargo test -p wg-cli --bin wg
      # model2vec-native lives in its own repo
      # (https://github.com/taeyun16/model2vec-native) and is pulled in
      # as a git dep when --features wg-core/semantic is on, so
      # `cargo test -p wg-core --features semantic` already exercises
      # it end-to-end here.

  # release-debug profile + dhat-heap feature are how `wg bench` reports
  # allocation backtraces. Compile-only check to make sure that path
  # doesn't bitrot — no need to run a benchmark in CI.
  dhat-build:
    name: dhat-heap build sanity
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wg-v2
          save-if: false
      - run: cargo build --profile release-debug -p wg-cli --features wg-core/semantic,dhat-heap

  ffi-c-smoke:
    name: wg-ffi C smoke
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wg-v2
          save-if: false
      - run: cargo build -p wg-ffi --release
      # libwg_ffi.a transitively links native_tls/openssl-sys via
      # wg-core's HTTP deps, so the cc invocation needs -lssl -lcrypto
      # to satisfy the OpenSSL symbols. Ubuntu runners already ship
      # libssl-dev, so no apt step needed.
      - run: |
          cc crates/wg-ffi/example/smoke.c \
             -I crates/wg-ffi/include \
             target/release/libwg_ffi.a \
             -lpthread -ldl -lm -lssl -lcrypto \
             -o target/wg-ffi-smoke
          target/wg-ffi-smoke

  # The plugin is pure Python (the WgClient shells to the wg CLI by
  # default, with an optional in-process wg-python binding). We build
  # the wg CLI once and run pytest against both supported Python
  # versions sequentially in the same job — that's cheaper than two
  # parallel jobs that each redo the cargo build.
  hermes-plugin:
    name: hermes-wg plugin
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wg-v2
          save-if: false
      - name: build wg CLI
        run: cargo build -p wg-cli

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: plugins/hermes/pyproject.toml
      - name: pytest (py3.10)
        working-directory: plugins/hermes
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pytest -q

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: plugins/hermes/pyproject.toml
      - name: pytest (py3.12)
        working-directory: plugins/hermes
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pytest -q

      - name: e2e smoke against real wg binary
        working-directory: plugins/hermes
        env:
          PATH: ${{ github.workspace }}/target/debug:${{ env.PATH }}
        run: |
          python - <<'PY'
          import os, shutil, tempfile
          from hermes_wg.client import WgClient
          tmp = tempfile.mkdtemp(prefix="wg-ci-")
          try:
              c = WgClient(store_path=os.path.join(tmp, "wiki.redb"))
              assert c.backend == "cli", f"expected cli backend, got {c.backend}"
              fid = c.fact_add("CI smoke fact", entities=["ci"], fact_type="note")
              assert len(fid) == 26, f"expected 26-char ULID, got {fid!r}"
              recent = c.recent(last="1h", limit=5)
              assert len(recent) == 1, f"expected 1 recent fact, got {len(recent)}"
              print("OK: hermes-wg e2e smoke passed")
          finally:
              shutil.rmtree(tmp, ignore_errors=True)
          PY
