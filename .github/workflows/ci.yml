name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --features semantic

  test:
    name: cargo test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-default-features
      - run: cargo test -p wg-core --features semantic
      - run: cargo test -p wg-cli --bin wg
      # Verifies the vendored tokenizers patch + model2vec-native build
      # cleanly. The integration tests in model2vec-native (smoke.rs)
      # require a real ~500 MB HF model cache, so we just compile and
      # run the lib-level tests here. Build alone catches API drift.
      - run: cargo build -p model2vec-native
      - run: cargo test -p model2vec-native --lib

  dhat-build:
    name: dhat-heap build sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The release-debug profile + dhat-heap feature are how
      # `wg bench` reports allocation backtraces. Compile-only check
      # to make sure that path doesn't bitrot — no need to run a
      # benchmark in CI.
      - run: cargo build --profile release-debug -p wg-cli --features wg-core/semantic,dhat-heap

  docs:
    name: cargo doc (no warnings)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --features semantic

  ffi-c-smoke:
    name: wg-ffi C smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p wg-ffi --release
      - run: |
          cc crates/wg-ffi/example/smoke.c \
             -I crates/wg-ffi/include \
             target/release/libwg_ffi.a \
             -lpthread -ldl -lm \
             -o target/wg-ffi-smoke
          target/wg-ffi-smoke
