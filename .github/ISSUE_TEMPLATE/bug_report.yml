name: Bug report
description: Report a reproducible AideMemo problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output of `aidememo --version`, package version, or commit SHA.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - MCP stdio
        - MCP HTTP
        - aidememo-agent-sdk
        - aidememo-python
        - aidememo-napi
        - aidememo-nif
        - aidememo-ffi
        - Hermes plugin
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, input files, or code needed to reproduce.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Include the last relevant command output. Redact secrets.
      render: text
