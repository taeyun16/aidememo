[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aidememo-agent-sdk"
version = "0.1.0"
description = "Code-first agent memory SDK for AideMemo (aidememo)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "Taeyun Jang", email = "taeyun16@pm.me" }]
keywords = ["aidememo", "agent-memory", "knowledge-graph", "codex", "claude-code", "hermes-agent"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.optional-dependencies]
binding = ["aidememo-python>=0.1"]
test = ["pytest>=8.0"]

[project.urls]
Homepage = "https://github.com/taeyun16/aidememo"
Documentation = "https://github.com/taeyun16/aidememo/tree/main/packages/aidememo-agent-sdk"
Source = "https://github.com/taeyun16/aidememo/tree/main/packages/aidememo-agent-sdk"
Issues = "https://github.com/taeyun16/aidememo/issues"

[project.scripts]
aidememo-worker-lane = "aidememo_agent.worker_lane:main"

[tool.hatch.build.targets.wheel]
packages = ["src/aidememo_agent"]
