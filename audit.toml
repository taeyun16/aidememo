# `cargo-audit` configuration.
#
# CI runs `cargo audit` on every push (see .github/workflows/ci.yml `audit`
# job). The advisories below are known and tracked but either need a larger
# upgrade or occur only in inactive optional lockfile entries. Each entry has
# an owner reason and removal condition; review during 0.2.0 prep.

[advisories]
ignore = [
    # quick-xml 0.38.x is present only through oneio's optional `s3`
    # dependency graph. AideMemo enables oneio's default HTTPS features,
    # not oneio/s3; its own `s3` feature uses aws-sdk-s3 instead. cargo-audit
    # scans optional lockfile entries even when no shipped feature compiles
    # them. Remove these once oneio widens its quick-xml requirement.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",

    # rustls-webpki transitive (pulled in by ureq/reqwest's TLS stack).
    # Both panic and name-constraint advisories are about server-cert
    # validation paths; aidememo only uses TLS as a *client* against pinned
    # huggingface.co / OpenAI endpoints, so the impact is bounded.
    # Drops out once ureq/reqwest publish releases that pull in newer
    # rustls-webpki — track in https://github.com/rustls/webpki/releases
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",

    # Unmaintained crates (warnings, not vulnerabilities). Replacing them
    # would mean churning multiple transitive deps' API surface — accept
    # for now, revisit during 0.2.0.
    "RUSTSEC-2025-0141",  # bincode (replaced by serde-bincode upstream)
    "RUSTSEC-2025-0057",  # fxhash (rustc-hash is the de-facto successor)
    "RUSTSEC-2024-0436",  # paste (proc-macro, transitive only)
]
